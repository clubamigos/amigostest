<!DOCTYPE html>
<html>
<head>
  <title>WC Predictor</title>
  <link rel="stylesheet" href="predictor.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header class="main-header">
  <div class="header-container">

    <div class="logo" id="logoTrigger">CLUB AMIGOS</div>

    <!-- NAVIGATION (ALWAYS FREE ACCESS) -->
    <nav id="mainNav" class="main-nav">
  <a href="#leaderboard" onclick="navigate('leaderboard')">Leaderboard</a>
  <a href="#match" onclick="navigate('match')">Match Prediction</a>
  <a href="#bracket" onclick="navigate('bracket')">Bracket Prediction</a>
</nav>

    <div id="guestView" class="auth-area">
      <button class="secondary-btn header-btn" onclick="openLogin()">Login</button>
    </div>

    <div id="userView" class="auth-area hidden">
      <span id="welcomeText"></span>
      <button class="secondary-btn header-btn" onclick="logout()">Logout</button>
    </div>

  </div>
</header>

<!-- MAIN CONTENT BOX -->
<section class="section">
  <h2>World Cup 2026 Predictor</h2>
  <p>Make predictions with friends</p>
</section>

<!-- PAGES -->
<section id="leaderboard" class="page-section">
  <div class="page-box">
    <h2>Leaderboard</h2>

    <div class="table-wrapper">
  <table class="leaderboard-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Username</th>
          <th>Match Points</th>
          <th>Bracket Points</th>
          <th>Total Points</th>
        </tr>
      </thead>

      <tbody id="leaderboardBody"></tbody>
      </table>
</div>

  </div>
</section>

<section id="match" class="page-section hidden">
  <div class="page-box">
    <h2>Match Prediction</h2>
  </div>
</section>

<section id="bracket" class="page-section hidden">
  <div class="page-box">
    <h2>Bracket Prediction</h2>
  </div>
</section>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <h3>Login</h3>

    <input type="text" id="loginPhone" placeholder="Phone Number">
    <input type="password" id="loginPassword" placeholder="Password">

    <button class="primary-btn" onclick="login()">Login</button>
    <button class="secondary-btn" onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- ADMIN MODAL -->
<div id="adminModal" class="modal">
  <div class="modal-content">
    <h3>Admin Access</h3>

    <input type="password" id="adminPassword" placeholder="Enter Admin Password">

    <button class="primary-btn" onclick="verifyAdmin()">Enter</button>
    <button class="secondary-btn" onclick="closeAdminModal()">Cancel</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
